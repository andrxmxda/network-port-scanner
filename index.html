<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ CyberScan Dashboard</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: linear-gradient(135deg, #fce7f3 0%, #fae8ff 100%); 
            color: #475569; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .card { 
            background: rgba(255, 255, 255, 0.75); 
            backdrop-filter: blur(10px); 
            padding: 2.5rem; 
            border-radius: 24px; 
            box-shadow: 0 20px 40px rgba(244, 63, 94, 0.1); 
            width: 420px; 
            border: 1px solid rgba(255, 255, 255, 0.6); 
        }
        h2 { 
            margin-top: 0; 
            color: #db2777; 
            font-size: 1.8rem; 
            font-weight: 800; 
            text-align: center; 
            letter-spacing: -0.5px; 
            margin-bottom: 1.5rem; 
        }
        label { 
            font-size: 0.85rem; 
            font-weight: 600; 
            color: #9d174d; 
            text-transform: uppercase; 
            letter-spacing: 0.5px; 
        }
        input { 
            width: 100%; 
            padding: 0.85rem; 
            margin: 0.4rem 0 1.2rem 0; 
            border-radius: 12px; 
            border: 1.5px solid #fbcfe8; 
            background: rgba(255, 255, 255, 0.9); 
            color: #334155; 
            box-sizing: border-box; 
            font-size: 0.95rem; 
            transition: all 0.2s ease; 
        }
        input:focus { 
            outline: none; 
            border-color: #f472b6; 
            box-shadow: 0 0 0 4px rgba(244, 114, 182, 0.15); 
        }
        button { 
            width: 100%; 
            padding: 1rem; 
            border-radius: 12px; 
            background: linear-gradient(135deg, #ec4899 0%, #be185d 100%); 
            border: none; 
            color: white; 
            font-weight: 700; 
            font-size: 1rem; 
            cursor: pointer; 
            margin-top: 0.5rem; 
            box-shadow: 0 4px 12px rgba(236, 72, 153, 0.3); 
            transition: all 0.2s ease; 
        }
        button:hover { 
            transform: translateY(-1px); 
            box-shadow: 0 6px 16px rgba(236, 72, 153, 0.4); 
        }
        button:active { 
            transform: translateY(1px); 
        }
        #results { 
            margin-top: 1.5rem; 
            background: #fff5f7; 
            padding: 1.25rem; 
            border-radius: 14px; 
            font-family: "SFMono-Regular", Consolas, monospace; 
            font-size: 0.9rem; 
            font-weight: 500; 
            color: #9d174d; 
            border: 1px solid #fce7f3; 
            border-left: 5px solid #f472b6; 
            display: none; 
            white-space: pre-wrap; 
            line-height: 1.5; 
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>✨ Network Scanner</h2>
        <label>Target Host / IP</label>
        <input type="text" id="target" value="8.8.8.8">
        <label>Start Port</label>
        <input type="number" id="start" value="50">
        <label>End Port</label>
        <input type="number" id="end" value="55">
        <button onclick="startScan()">Launch Scan ✨</button>
        <div id="results"></div>
    </div>

    <script>
        async function startScan() {
            const target = document.getElementById('target').value;
            const start = document.getElementById('start').value;
            const end = document.getElementById('end').value;
            const resultsDiv = document.getElementById('results');
            
            resultsDiv.style.display = "block";
            resultsDiv.innerText = "Scanning network target...";

            try {
                const response = await fetch(`https://redesigned-space-memory-9754w5x79j742p5j9-8000.app.github.dev/scan?target=${target}&start=${start}&end=${end}`);
                const data = await response.json();
                
                if (data.error) {
                    resultsDiv.innerText = `❌ Error: ${data.error}`;
                } else {
                    resultsDiv.innerText = `Target: ${data.target} (${data.ip})\n\n🟢 Open Ports: ${data.open_ports.length ? data.open_ports.join(', ') : 'None found'}`;
                }
            } catch (err) {
                resultsDiv.innerText = "❌ Connection failed. Ensure backend API is running.";
            }
        }
    </script>
</body>
</html>
